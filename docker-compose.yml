# AgentExchange Platform — Production Docker Compose
#
# Services:   api · ingestion · celery · celery-beat · redis · timescaledb · pgadmin · prometheus · grafana
# Network:    internal (bridge, no external routing required)
# Volumes:    timescaledb_data · redis_data · grafana_data · pgadmin_data
# Env vars:   loaded from .env (see .env.example)
#
# Minimum requirements: ~8 CPU cores, ~10 GB RAM

services:

  # ─────────────────────────────────────────────────────────────
  # Infrastructure: TimescaleDB (PostgreSQL 16 + TimescaleDB)
  # ─────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:2.25.1-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Infrastructure: Redis 7 (cache + pub/sub + rate limiting)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Enable AOF persistence + RDB snapshots for durability.
    # Redis is only reachable on the internal Docker network (no host port),
    # so requirepass is not needed — the network isolation is the security boundary.
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --save 300 10
      --save 900 100
    volumes:
      - redis_data:/data
    # No host port exposed — Redis is only reachable within the Docker internal
    # network (e.g. redis:6379 from api/celery/ingestion containers).
    # This eliminates external attack surface entirely (stronger than 127.0.0.1 binding).
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Application: FastAPI Gateway
  # ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "8000:8000"
    networks:
      - internal
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Application: Price Ingestion Service (no external port)
  # ─────────────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      BINANCE_WS_URL: ${BINANCE_WS_URL}
    healthcheck:
      test: ["CMD", "python", "-c", "import redis,os,sys,datetime as dt; r=redis.from_url(os.environ['REDIS_URL']); ts=r.hget('prices:meta','BTCUSDT'); sys.exit(1) if not ts else sys.exit(0 if (dt.datetime.now(dt.timezone.utc)-dt.datetime.fromisoformat(ts.decode())).total_seconds()<120 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Application: Celery Worker (background tasks)
  # ─────────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: ["celery", "-A", "src.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=4", "-Q", "default,high_priority"]
    networks:
      - internal
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks.celery_app inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Application: Celery Beat (task scheduler)
  # ─────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: ["celery", "-A", "src.tasks.celery_app", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid"]
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/celerybeat.pid"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - internal
    depends_on:
      celery:
        condition: service_started
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Database Admin: pgAdmin 4 (web UI for PostgreSQL/TimescaleDB)
  #
  # WARNING: Development tool only. Do NOT start in production.
  # Start with:  docker compose --profile dev up pgadmin
  # Credentials must be set via PGADMIN_EMAIL / PGADMIN_PASSWORD
  # in .env — do NOT rely on the changeme defaults in production.
  # ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["dev"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tradeready.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./pgpassfile:/tmp/pgpassfile:ro
    ports:
      - "5050:5050"
    networks:
      - internal
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Monitoring: Prometheus
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts/agent-alerts.yml:/etc/prometheus/rules/agent-alerts.yml:ro
    ports:
      - "9090:9090"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Monitoring: Alertmanager (routes Prometheus alerts to receivers)
  # ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    ports:
      - "9093:9093"
    networks:
      - internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Monitoring: Grafana
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - internal
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Agent: TradeReady Platform Testing Agent + ML Strategy System
  #
  # Only starts when the "agent" profile is explicitly requested:
  #   docker compose --profile agent up agent
  #
  # The service runs once and exits (no restart policy). Volume mounts
  # persist RL model checkpoints, regime classifier models, evolutionary
  # results, and JSON validation reports across container restarts.
  #
  # Required env vars (supplied via agent/.env):
  #   OPENROUTER_API_KEY  — OpenRouter API key for LLM calls
  #   PLATFORM_API_KEY    — ak_live_... platform API key
  #   PLATFORM_API_SECRET — sk_live_... platform API secret
  #   PLATFORM_BASE_URL   — http://api:8000 (internal Docker hostname)
  # ─────────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    profiles:
      - agent
    env_file: agent/.env
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./agent/reports:/app/agent/reports
      - ./agent/strategies/rl/models:/app/agent/strategies/rl/models
      - ./agent/strategies/regime/models:/app/agent/strategies/regime/models
      - ./agent/strategies/evolutionary/results:/app/agent/strategies/evolutionary/results
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────
  # Backup Sidecar: Automated daily database backup at 02:00 UTC
  #
  # Uses Alpine Linux + postgresql16-client (pg_dump).
  # Backup files are stored in the named volume `backup_data`.
  # Retention: 7 daily + 4 weekly snapshots (managed by backup_db.sh).
  #
  # NOTE: pg_dump connects directly to timescaledb via the Docker
  # network (not via docker compose exec) in this container.
  # PGHOST is set to the timescaledb service hostname.
  #
  # Manual operations:
  #   Trigger immediate backup:
  #     docker compose exec db-backup backup_db.sh
  #   Check backup health:
  #     docker compose exec db-backup sh /scripts/check_backup_health.sh
  #   List available backups:
  #     docker compose exec db-backup ls -lht /backups/
  #   Restore from backup:
  #     See scripts/restore_database.sh for full instructions.
  # ─────────────────────────────────────────────────────────────
  db-backup:
    image: alpine:3.21
    restart: unless-stopped
    environment:
      BACKUP_DIR: /backups
      POSTGRES_HOST: timescaledb
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_LOG: /var/log/backup.log
    volumes:
      - backup_data:/backups
      - ./scripts/backup_db.sh:/scripts/backup_db.sh:ro
      - ./scripts/backup_cron.sh:/scripts/backup_cron.sh:ro
      - ./scripts/check_backup_health.sh:/scripts/check_backup_health.sh:ro
    networks:
      - internal
    depends_on:
      timescaledb:
        condition: service_healthy
    # Install pg_dump, then hand off to the cron wrapper.
    # bash is required because the backup scripts use bash features.
    entrypoint: ["sh", "-c"]
    command:
      - |
        apk add --no-cache bash postgresql16-client && \
        chmod +x /scripts/backup_db.sh /scripts/backup_cron.sh /scripts/check_backup_health.sh && \
        exec bash /scripts/backup_cron.sh
    healthcheck:
      test: ["CMD", "sh", "/scripts/check_backup_health.sh"]
      interval: 1h
      timeout: 10s
      retries: 1
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────────────────────
volumes:
  timescaledb_data:
  redis_data:
  grafana_data:
  pgadmin_data:
  backup_data:

# ─────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
