# AgentExchange Platform — Development Overrides
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Changes vs production:
#   - Hot-reload enabled for api and ingestion (volume mounts src/)
#   - Relaxed resource limits (shares host resources freely)
#   - Debug port 5678 exposed on api for debugpy
#   - API runs with --reload flag
#   - Celery runs with --loglevel=debug
#   - TimescaleDB and Redis ports already exposed in base; no changes needed

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount source for hot-reload
      - ./src:/app/src
      - ./alembic:/app/alembic
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
      - "5678:5678"   # debugpy remote debug port
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    volumes:
      - ./src:/app/src
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery:
    volumes:
      - ./src:/app/src
    command: ["celery", "-A", "src.tasks.celery_app", "worker", "--loglevel=debug", "--concurrency=2"]
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery-beat:
    volumes:
      - ./src:/app/src
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  timescaledb:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  redis:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
