name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd ~/TradeReady_BackEnd-
            set -a && source .env && set +a

            echo "=== Record rollback point ==="
            ROLLBACK_COMMIT=$(git rev-parse HEAD)
            echo "$ROLLBACK_COMMIT" > /tmp/last-deploy-rollback.txt
            echo "Rollback commit: $ROLLBACK_COMMIT"

            echo "=== Database backup (schema + app data, excluding heavy time-series) ==="
            mkdir -p ~/backups
            docker compose exec -T timescaledb pg_dump \
              -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
              --no-owner --no-acl \
              --exclude-table-data='_timescaledb_internal._hyper_*' \
              --exclude-table-data='ticks' \
              --exclude-table-data='candles_backfill' \
              --exclude-table-data='portfolio_snapshots' \
              --exclude-table-data='backtest_snapshots' \
              | gzip > ~/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz
            echo "Backup saved"

            echo "=== Pull latest main ==="
            git stash --include-untracked || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Build application images ==="
            docker compose build api ingestion celery

            echo "=== Record pre-migration revision ==="
            ROLLBACK_REVISION=$(docker compose exec -T api alembic current 2>/dev/null | grep -oP '^\w+' | head -1)
            echo "Rollback revision: $ROLLBACK_REVISION"

            echo "=== Run database migrations ==="
            docker compose exec -T api alembic upgrade head

            echo "=== Ensure infrastructure is healthy ==="
            docker compose up -d timescaledb redis
            echo "Waiting for infra health checks..."
            sleep 15

            echo "=== Rolling restart of app services ==="
            docker compose up -d celery-beat
            docker compose up -d celery
            sleep 5
            docker compose up -d api
            sleep 5
            docker compose up -d ingestion

            echo "=== Health check ==="
            sleep 15
            curl -sf http://localhost:8000/health || {
              echo "HEALTH CHECK FAILED - rolling back to $ROLLBACK_COMMIT"
              git checkout "$ROLLBACK_COMMIT"
              docker compose build api ingestion celery
              docker compose up -d api ingestion celery celery-beat
              docker compose exec -T api alembic downgrade "${ROLLBACK_REVISION:-017}"
              exit 1
            }

            echo "=== Deploy successful - $(date) ==="
