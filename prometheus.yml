# Prometheus scrape configuration for AgentExchange Platform

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: agentexchange
    env: production

# Load alert rules — agent ecosystem alerts
rule_files:
  - /etc/prometheus/rules/agent-alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Platform API — default Prometheus registry at /metrics (port 8000)
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Agent server — AGENT_REGISTRY at /metrics (port 8001)
  # AgentServer._metrics_server_loop binds to agent_server_host:agent_server_port
  # (default 0.0.0.0:8001). Only active when the agent profile is running.
  - job_name: agent
    metrics_path: /metrics
    static_configs:
      - targets: ["agent:8001"]
