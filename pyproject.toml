[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ANN", # flake8-annotations (type hints)
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
]
ignore = [
    "ANN101", # Missing type annotation for `self`
    "ANN102", # Missing type annotation for `cls`
    "S101",   # Use of `assert` (needed in tests)
    "UP040",  # TypeAlias annotation (needed for try/except patterns in dependencies.py)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "S"]

[tool.ruff.lint.isort]
known-first-party = ["src", "sdk"]
force-sort-within-sections = true

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_equality = true
extra_checks = true
# redis.asyncio stubs return Awaitable[X] | X unions that mypy [misc]
# flags as "Incompatible types in await".  This is a known redis-py
# typing issue, not a real bug.  Disabling [misc] avoids dozens of
# false-positive suppressions across cache, risk, monitoring modules.
disable_error_code = ["misc"]

[[tool.mypy.overrides]]
module = [
    "asyncpg.*",
    "celery.*",
    "locust.*",
    "factory.*",
    "aioresponses.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "agent.strategies.rl.*"
warn_unused_ignores = false
disallow_subclassing_any = false

[[tool.mypy.overrides]]
module = "src.mcp.tools"
warn_unused_ignores = false

# redis.asyncio type stubs produce false positives with strict mode —
# the Awaitable union type from redis-py doesn't satisfy mypy's await checks.
# These modules are relaxed from strict to avoid hundreds of # type: ignore[misc].
[[tool.mypy.overrides]]
module = [
    "src.cache.*",
    "src.exchange.symbol_validation",
    "src.risk.circuit_breaker",
    "src.monitoring.health",
    "src.price_ingestion.broadcaster",
    "src.api.middleware.rate_limit",
    "src.api.routes.market",
    "src.api.routes.indicators",
    "src.api.websocket.handlers",
    "src.dependencies",
    "src.risk.manager",
]
strict = false
warn_unused_ignores = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--cov=src --cov-report=term-missing --cov-report=html"
markers = [
    "slow: marks tests that need full app startup or take >5s (deselect with '-m \"not slow\"')",
    "celery: marks Celery task tests (select with '-m celery')",
]
