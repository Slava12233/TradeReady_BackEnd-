# Alembic configuration for the AI Agent Crypto Trading Platform.
# The database URL is overridden at runtime by alembic/env.py which reads
# from src.config.get_settings() so that the .env file is the single source
# of truth for connection parameters.

[alembic]
# Path to the alembic migrations folder
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with the repo root so `src` imports work inside env.py
prepend_sys_path = .

# Timezone for auto-generated revision timestamps
timezone = UTC

# Truncate long revision messages in filenames
truncate_slug_length = 40

# Version table name (default: alembic_version)
version_table = alembic_version

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Run ruff format on every generated migration file
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
